# =============================================================================
# Hyprshot — Screenshot Tool
# =============================================================================

# ─── Diretório de saída ──────────────────────────────────────────────────────

output_directory = ~/Pictures/Screenshots
output_file_template = screenshot_%Y-%m-%d_%H-%M-%S

# ─── Notificações ────────────────────────────────────────────────────────────

notify = true
notification_icon = camera-photo
notification_message = Screenshot salvo: {file}

# ─── Formatos ─────────────────────────────────────────────────────────────────

mode = output
mode = window
mode = region

# ─── Atalhos (já no hyprland.conf) ──────────────────────────────────────────

# bind = , Print, exec, hyprshot -m output
# bind = $mainMod, Print, exec, hyprshot -m window
# bind = SHIFT, Print, exec, hyprshot -m region

# ─── Opções adicionais ───────────────────────────────────────────────────────

# Freeze screen before region selection
freeze = true

# Delay before screenshot (em segundos)
delay = 0.5

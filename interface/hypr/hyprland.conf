###############################################
### HYPRLAND CONFIG — LUCAS / ZENNIT OS     ###
### Tema: Terafox (Nightfox)                ###
### Versão: 2.0 — Com Wlogout/SwayNC/Wofi   ###
###############################################

# ─── MONITORES (MANTIDO) ──────────────────────────────────────────────────────

# HDMI-A-1 (esquerda)
monitor = HDMI-A-1,1366x768@59.79,0x0,1

# eDP-1 (direita)
monitor = eDP-1,1366x768@60.06,1366x0,1

# ─── WORKSPACES POR MONITOR ──────────────────────────────────────────────────

# HDMI-A-1 → Workspaces 1–5
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1

# eDP-1 → Workspaces 6–10
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

# ─── AUTOSTART ─────────────────────────────────────────────────────────────────

# Waybar com reload
exec-once = sh -c 'pkill waybar; sleep 0.5; waybar'

# Papel de parede
exec-once = hyprpaper

# Idle (bloqueio automático)
exec-once = hypridle

# Notificações (SwayNC substitui Dunst)
exec-once = sh -c 'pkill swaync; sleep 0.5; swaync'

# Applets do sistema
exec-once = nm-applet --indicator
exec-once = blueman-applet

# Portal do Wayland
exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = dbus-update-activation-environment --systemd --all

# MPV Paper (wallpaper animado) — REMOVIDA DUPLICATA
exec-once = mpvpaper -o "no-audio loop" HDMI-A-1 /home/lrossi/Imagens/wallpaper/galaxiaWallpaper.jpg
# exec-once = mpvpaper -o "no-audio loop" HDMI-A-1 /home/lrossi/Imagens/wallpaper/galaxiaWallpaper.jpg  # REMOVIDO (duplicado)

# ─── VARIÁVEIS DE AMBIENTE ────────────────────────────────────────────────────

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GTK_THEME,Adwaita-dark
env = GDK_BACKEND,wayland,x11
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1

# ─── LOOK AND FEEL ────────────────────────────────────────────────────────────

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2

    col.active_border = rgba(5a93aaee) rgba(8ebaa9ee) 45deg
    col.inactive_border = rgba(2f323988)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1f272999)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.17
        brightness = 1.0
        contrast = 1.0
        noise = 0.02
    }
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 8, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, default
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
}

# ─── INPUT ────────────────────────────────────────────────────────────────────

input {
    kb_layout = br
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# ─── KEYBINDINGS ──────────────────────────────────────────────────────────────

$mainMod = SUPER
$terminal = alacritty
$fileManager = dolphin
$menu = wofi --show drun
$navigator = google-chrome

# ─── APPS ──────────────────────────────────────────────────────────────────────

# Terminal
bind = $mainMod, RETURN, exec, $terminal

# Navegador
bind = $mainMod, G, exec, $navigator

# Gerenciador de arquivos
bind = $mainMod, E, exec, $fileManager

# Menu de aplicativos (Wofi)
bind = $mainMod, SPACE, exec, $menu

# Menu de execução (Wofi)
bind = $mainMod SHIFT, SPACE, exec, wofi --show run

# ─── CONTROLE DE JANELAS ─────────────────────────────────────────────────────

# Fechar janela
bind = $mainMod, Q, killactive

# Sair do Hyprland
bind = $mainMod SHIFT, Q, exit

# Alternar floating
bind = $mainMod, V, togglefloating

# Tela cheia
bind = $mainMod, F, fullscreen

# ─── POWER MENU (WLOGOUT) ────────────────────────────────────────────────────

# Menu de desligar (Wlogout)
bind = $mainMod, X, exec, ~/.local/bin/powermenu
bind = SHIFT, E, exec, ~/.local/bin/powermenu

# Lock screen (Hyprlock)
bind = $mainMod, L, exec, hyprlock

# ─── NOTIFICAÇÕES (SWAYNC) ──────────────────────────────────────────────────

# Abrir centro de notificações
bind = $mainMod, N, exec, swaync-client -t
bind = $mainMod SHIFT, N, exec, swaync-client -c

# Alternar "Não Perturbe"
bind = $mainMod, D, exec, swaync-client -d

# ─── SCREENSHOTS ─────────────────────────────────────────────────────────────

# Hyprshot (mais completo)
bind = , Print, exec, hyprshot -m output
bind = $mainMod, Print, exec, hyprshot -m window
bind = SHIFT, Print, exec, hyprshot -m region



# ─── NAVEGAÇÃO ENTRE JANELAS ───────────────────────────────────────────────

# Setas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Vim-style (H J K L)
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# ─── WORKSPACES ──────────────────────────────────────────────────────────────

# Navegação
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover janelas para workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Workspace especial (flutuante)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ─── MOUSE BINDS ──────────────────────────────────────────────────────────────

# Mover/Redimensionar janelas com mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ─── ÁUDIO E BRILHO ──────────────────────────────────────────────────────────

# Áudio
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brilho
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# ─── MULTIMÍDIA ──────────────────────────────────────────────────────────────

# Controles de mídia
bindel = , XF86AudioPlay, exec, playerctl play-pause
bindel = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86AudioNext, exec, playerctl next

# ─── ATALHOS PARA DESENVOLVIMENTO ────────────────────────────────────────────

# Abrir editor (Neovim)
bind = $mainMod, RETURN, exec, $terminal -e nvim
bind = $mainMod SHIFT, RETURN, exec, $terminal

# Recarregar configurações
bind = $mainMod, R, exec, ~/.local/bin/reload-config

# Abrir configurações do Hyprland no editor
bind = $mainMod, PERIOD, exec, $terminal -e nvim ~/.config/hypr/hyprland.conf

# ─── WINDOW RULES ─────────────────────────────────────────────────────────────

# Tornar algumas janelas flutuantes por padrão
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(gnome-disks)$
windowrulev2 = float, class:^(gnome-system-monitor)$
windowrulev2 = float, title:^(Picture-in-Picture)$

# Wlogout (centralizado)
windowrulev2 = center, class:^(wlogout)$
windowrulev2 = float, class:^(wlogout)$
windowrulev2 = noborder, class:^(wlogout)$

# SwayNC (flutuante)
windowrulev2 = float, class:^(swaync)$
windowrulev2 = noborder, class:^(swaync)$

# ─── CONFIGURAÇÕES DE DESEMPENHO ────────────────────────────────────────────

# Configurações para melhor performance
decoration:blur:size = 6
decoration:blur:passes = 2

# ─── FIM ──────────────────────────────────────────────────────────────────────

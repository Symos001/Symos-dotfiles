# --- Configurações Básicas ---
set -g default-terminal "screen-256color"
set -g prefix C-a          # Muda o prefixo para Ctrl+a
unbind C-b
bind-key C-a send-prefix

# --- Usabilidade ---
set -g mouse on            # Habilita o mouse
set -g base-index 1        # Inicia janelas em 1 (mais fácil no teclado)
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# --- Atalhos de Divisão ---
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# --- Atalhos Estilo Vim para Painéis ---
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# --- Recarregar Configuração ---
unbind r
bind r source-file ~/.tmux.conf \; display "Configuração recarregada!"

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-battery'

# --- Configuração do Tema (Tokyo Night) ---
set -g @tokyo-night-tmux_window_id_style fdp
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare

# Widgets de Bateria e Data
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format DMY
set -g @tokyo-night-tmux_time_format 24H

set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_battery_name "BAT0"
set -g @tokyo-night-tmux_battery_low_threshold 20

# Inicializa o gerenciador de plugins (mantenha esta linha no final do arquivo)
run '~/.tmux/plugins/tpm/tpm'

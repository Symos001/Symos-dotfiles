# Configuração do Alacritty para Zorin OS

[window]
padding = { x = 12, y = 12 }
dynamic_padding = true
opacity = 0.9
blur = true
title = "Alacritty - Syscare Dev"

[font]
size = 11.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Beam", blinking = "On" }

[colors.primary]
background = "#1a1b26" # Estilo Tokyo Night (escuro e moderno)
foreground = "#a9b1d6"

[selection]
save_to_clipboard = true

[shell]
program = "/usr/bin/tmux"
args = ["new-session", "-A", "-s", "main"]
